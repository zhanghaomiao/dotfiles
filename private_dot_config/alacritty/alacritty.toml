[general]
# 开启配置热重载，改完代码保存即生效
live_config_reload = true

[env]
# 确保 256 色支持，解决你之前说的补全颜色看不见的问题
TERM = "xterm-256color"

[window]
# 窗口内边距，让代码呼吸更顺畅
padding = { x = 15, y = 15 }
# macOS 专属：隐藏标题栏，只留三个小红绿灯（或者设为 "None" 彻底隐藏）
decorations = "buttonless"
# 透明度：0.85-0.95 是黄金比例
opacity = 0.9
# 开启 macOS 原生背景模糊，质感拉满
blur = true
# 启动时是否全屏 (Windowed / Maximized / Fullscreen)
startup_mode = "Maximized"

[font]
# 顶级字体：JetBrains Mono Nerd Font
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 14.0

[cursor]
# 光标样式：使用方块并开启闪烁
style = { shape = "Block", blinking = "On" }
blink_interval = 500

[scrolling]
history = 10000
multiplier = 3

[selection]
# 选中文本自动复制到剪贴板
save_to_clipboard = true

# ==============================================================================
#  TOKYO NIGHT STORM 配色方案 (目前最火的暗色主题)
# ==============================================================================
[colors.primary]
background = "#24283b"
foreground = "#c0caf5"

[colors.cursor]
text = "#24283b"
cursor = "#c0caf5"

[colors.normal]
black   = "#1d202f"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

# ==============================================================================
#  快捷键进阶 (Keyboard Bindings)
# ==============================================================================
[[keyboard.bindings]]
# Cmd + Enter 切换全屏
key = "Enter"
mods = "Command"
action = "ToggleFullscreen"

[[keyboard.bindings]]
# 开启 Vi 模式 (Cmd + Shift + Space)，让你像用 Vim 一样在终端里“飞”
key = "Space"
mods = "Command|Shift"
action = "ToggleViMode"
