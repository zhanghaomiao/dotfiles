# ~/.tmux.conf (由 Chezmoi 管理)

# 1. 核心体验：开启鼠标支持（可以用鼠标滚轮看历史日志、拖动调整窗口大小）
set -g mouse on

# 2. 窗口序号从 1 开始（默认从 0 开始，按键盘太反人类了）
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# 3. 完美复刻 Vim 的分屏快捷键
# 默认前缀键是 Ctrl + b。按下 Ctrl+b 松开，再按下面这些键：
bind s split-window -v -c "#{pane_current_path}"  # s: 上下分屏
bind v split-window -h -c "#{pane_current_path}"  # v: 左右分屏
bind h select-pane -L  # h: 切到左边
bind j select-pane -D  # j: 切到下边
bind k select-pane -U  # k: 切到上边
bind l select-pane -R  # l: 切到右边

# 4. Tokyo Night 风格状态栏（和你的本地 Alacritty/Zellij 无缝衔接）
set -g status-style bg="#1a1b26",fg="#c0caf5"
set -g status-left "#[bg="#7aa2f7",fg="#15161e",bold]  #S #[bg="#1a1b26",fg="#7aa2f7"] "
set -g status-right "#[fg="#bb9af7"]#[bg="#bb9af7",fg="#15161e",bold] #h "
set -window-option -g window-status-current-format "#[fg="#1a1b26",bg="#9ece6a"]#[fg="#15161e",bg="#9ece6a",bold] #I:#W #[fg="#9ece6a",bg="#1a1b26"]"
set -window-option -g window-status-format " #I:#W "
