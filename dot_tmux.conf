# ==========================
# 核心体验优化
# ==========================
# 1. 开启鼠标支持 (极其重要！允许鼠标滚轮看日志、拖拽边缘调整分屏大小)
set -g mouse on

set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 2. 窗口和面板的序号从 1 开始 (默认从 0 开始，键盘按起来太远了)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 3. 解决 Vim 里按 ESC 键的延迟问题 (强迫症必备)
set -s escape-time 0

# 4. 开启 256 色和 True Color 支持 (防止你在服务器用 Vim 时颜色发青/发白)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ==========================
# 终极防卡顿/防延迟配置
# ==========================
# 5. 取消连续按键的等待时间 (解决切换面板后 500ms 内无法立刻输入字符的卡顿感)
set -g repeat-time 0

# 6. 开启焦点事件支持 (非常重要！让你在右侧面板的 Shell 或 Vim 能瞬间感知到被激活，消除底层渲染延迟)
set -g focus-events on

# ==========================
# 快捷键重映射 (纯正 Vim 风格)
# ==========================
# 保留默认的 Ctrl + b 作为前缀键。按下 Ctrl+b 松开后，按以下键：

# v 和 s：像 Vim 一样分屏 (并在新分屏自动进入当前路径)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# h/j/k/l：像 Vim 一样在分屏之间丝滑游走
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==========================
# UI 界面美化 (Tokyo Night 极简风)
# ==========================
# 状态栏整体背景色
set -g status-style bg="#1a1b26",fg="#c0caf5"

# 状态栏左侧：显示 Session 名称 (比如你的 Tmux 会话叫 0)
set -g status-left "#[bg=#7aa2f7,fg=#15161e,bold]  #S #[bg=#1a1b26,fg=#7aa2f7,none] "
set -g status-left-length 30

# 状态栏右侧：显示服务器主机名 (让你清楚知道在操作 Dell 服务器)
set -g status-right "#[fg=#bb9af7,bg=#1a1b26]#[bg=#bb9af7,fg=#15161e,bold] #h "

# 中间窗口列表：未激活的普通窗口
setw -g window-status-format "#[fg=#c0caf5,bg=#1a1b26] #I:#W "

# 中间窗口列表：当前正在操作的窗口 (用清新的绿色高亮)
setw -g window-status-current-format "#[fg=#1a1b26,bg=#9ece6a]#[fg=#15161e,bg=#9ece6a,bold] #I:#W #[fg=#9ece6a,bg=#1a1b26,none]"
